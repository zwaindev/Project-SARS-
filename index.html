<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SARS — Deprem İzleme</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&family=Syne+Mono&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #f2f1ed;
  --surface:  #ffffff;
  --ink:      #1a1a1a;
  --ink2:     #555550;
  --ink3:     #999990;
  --border:   #e0dfd9;
  --green:    #1a9e5c;
  --green-bg: #edf7f2;
  --amber:    #d97706;
  --amber-bg: #fef3e2;
  --red:      #dc2626;
  --red-bg:   #fef2f2;
  --blue:     #2563eb;
  --mono:     'IBM Plex Mono', monospace;
  --syne:     'Syne', sans-serif;
  --synemono: 'Syne Mono', monospace;
}

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--mono);
  font-size: 13px;
  line-height: 1.6;
  min-height: 100vh;
}

/* ── TOPBAR ───────────────────────────────── */
.topbar {
  background: var(--ink);
  color: #fff;
  padding: 0 28px;
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}

.topbar-left {
  display: flex;
  align-items: center;
  gap: 18px;
}

.topbar-logo {
  font-family: var(--synemono);
  font-size: 15px;
  letter-spacing: 2px;
  color: #fff;
}

.topbar-sep { color: #444; font-size: 11px; }

.topbar-sub {
  font-family: var(--mono);
  font-size: 10px;
  color: #888;
  letter-spacing: 1px;
}

.topbar-right {
  display: flex;
  align-items: center;
  gap: 16px;
}

.live-pill {
  display: flex;
  align-items: center;
  gap: 6px;
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 2px;
  color: #4ade80;
}

.live-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: #4ade80;
  box-shadow: 0 0 6px #4ade80;
  animation: blink 2s infinite;
}

@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

.topbar-time {
  font-family: var(--mono);
  font-size: 10px;
  color: #666;
  letter-spacing: 1px;
}

/* ── HERO ─────────────────────────────────── */
.hero {
  background: var(--ink);
  position: relative;
  overflow: hidden;
  padding: 48px 28px 40px;
}

/* subtle grid bg */
.hero::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
  background-size: 32px 32px;
}

/* seismic wave */
.hero-wave {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 60px;
  overflow: hidden;
}

.hero-wave canvas { width: 100%; height: 100%; display: block; }

.hero-inner {
  position: relative;
  z-index: 2;
  max-width: 880px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 32px;
  align-items: end;
}

.hero-text {}

.hero-eyebrow {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--green);
  letter-spacing: 4px;
  text-transform: uppercase;
  margin-bottom: 14px;
}

.hero-title {
  font-family: var(--syne);
  font-weight: 800;
  font-size: clamp(32px, 5vw, 52px);
  color: #fff;
  line-height: 1.0;
  letter-spacing: -1px;
  margin-bottom: 14px;
}

.hero-title span { color: #4ade80; }

.hero-desc {
  font-family: var(--mono);
  font-size: 11px;
  color: #888;
  max-width: 480px;
  line-height: 1.8;
  letter-spacing: 0.3px;
}

.hero-stats {
  display: flex;
  flex-direction: column;
  gap: 12px;
  align-items: flex-end;
}

.hstat {
  text-align: right;
}

.hstat-num {
  font-family: var(--syne);
  font-weight: 700;
  font-size: 28px;
  color: #fff;
  line-height: 1;
}

.hstat-label {
  font-family: var(--mono);
  font-size: 9px;
  color: #555;
  letter-spacing: 2px;
  text-transform: uppercase;
}

/* ── MAIN ─────────────────────────────────── */
.main {
  max-width: 880px;
  margin: 0 auto;
  padding: 32px 28px 80px;
}

/* ── SUBSCRIBE ────────────────────────────── */
.subscribe-bar {
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 24px 28px;
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 24px;
  align-items: center;
  margin-bottom: 32px;
}

.sub-text {}

.sub-heading {
  font-family: var(--syne);
  font-weight: 700;
  font-size: 16px;
  color: var(--ink);
  margin-bottom: 4px;
}

.sub-desc {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--ink3);
  letter-spacing: 0.3px;
}

.sub-form {
  display: flex;
  gap: 8px;
}

.sub-input {
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--ink);
  font-family: var(--mono);
  font-size: 12px;
  padding: 10px 14px;
  outline: none;
  width: 220px;
  transition: border-color 0.2s;
}

.sub-input:focus { border-color: var(--ink); }
.sub-input::placeholder { color: var(--ink3); }

.sub-btn {
  background: var(--ink);
  border: none;
  color: #fff;
  font-family: var(--syne);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1px;
  padding: 10px 20px;
  cursor: pointer;
  transition: background 0.2s;
  white-space: nowrap;
}

.sub-btn:hover { background: #333; }

.sub-msg {
  font-family: var(--mono);
  font-size: 10px;
  margin-top: 8px;
  display: none;
  grid-column: 1 / -1;
}

.sub-msg.ok { color: var(--green); }
.sub-msg.err { color: var(--red); }

/* ── SECTION LABEL ────────────────────────── */
.section-label {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
}

.section-label-text {
  font-family: var(--syne);
  font-weight: 700;
  font-size: 12px;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--ink);
}

.section-label-meta {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--ink3);
  letter-spacing: 1px;
}

/* ── QUAKE CARDS ──────────────────────────── */
.quake-list { display: flex; flex-direction: column; gap: 2px; }

.quake-card {
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 20px 24px;
  display: grid;
  grid-template-columns: 72px 1fr;
  gap: 20px;
  opacity: 0;
  transform: translateY(8px);
  animation: fadeUp 0.35s ease forwards;
  transition: border-color 0.2s, box-shadow 0.2s;
}

.quake-card:hover {
  border-color: #ccc;
  box-shadow: 0 2px 12px rgba(0,0,0,0.06);
}

.quake-card:nth-child(1) { animation-delay:.04s }
.quake-card:nth-child(2) { animation-delay:.08s }
.quake-card:nth-child(3) { animation-delay:.12s }
.quake-card:nth-child(4) { animation-delay:.16s }
.quake-card:nth-child(5) { animation-delay:.20s }
.quake-card:nth-child(6) { animation-delay:.24s }
.quake-card:nth-child(7) { animation-delay:.28s }
.quake-card:nth-child(8) { animation-delay:.32s }

@keyframes fadeUp {
  to { opacity:1; transform:translateY(0); }
}

/* severity strip */
.quake-card.severe  { border-left: 3px solid var(--red); }
.quake-card.moderate{ border-left: 3px solid var(--amber); }
.quake-card.minor   { border-left: 3px solid #d0d0ca; }

.mag-block {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-top: 2px;
}

.mag-num {
  font-family: var(--syne);
  font-weight: 800;
  line-height: 1;
}

.quake-card.severe  .mag-num { font-size: 38px; color: var(--red); }
.quake-card.moderate .mag-num { font-size: 34px; color: var(--amber); }
.quake-card.minor   .mag-num { font-size: 30px; color: #aaa; }

.mag-unit {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--ink3);
  letter-spacing: 1px;
  margin-top: 2px;
}

.mag-bar {
  width: 40px;
  height: 3px;
  background: var(--border);
  border-radius: 2px;
  margin-top: 8px;
  overflow: hidden;
}

.mag-fill { height: 100%; border-radius: 2px; }
.quake-card.severe  .mag-fill { background: var(--red); }
.quake-card.moderate .mag-fill { background: var(--amber); }
.quake-card.minor   .mag-fill { background: #ccc; }

.quake-info {}

.quake-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 6px;
}

.quake-loc {
  font-family: var(--syne);
  font-size: 15px;
  font-weight: 600;
  color: var(--ink);
  line-height: 1.3;
}

.sev-tag {
  font-family: var(--mono);
  font-size: 8px;
  letter-spacing: 2px;
  padding: 3px 8px;
  border-radius: 2px;
  text-transform: uppercase;
  white-space: nowrap;
  flex-shrink: 0;
  margin-top: 2px;
}

.sev-tag.severe   { background: var(--red-bg);   color: var(--red); }
.sev-tag.moderate { background: var(--amber-bg);  color: var(--amber); }
.sev-tag.minor    { background: #f4f4f0;           color: var(--ink3); }

.quake-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 14px;
  margin-bottom: 12px;
}

.meta-item {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--ink2);
  display: flex;
  align-items: center;
  gap: 4px;
}

.meta-icon { font-size: 10px; }

/* AI BOX */
.ai-box {
  background: var(--green-bg);
  border-left: 2px solid var(--green);
  padding: 10px 14px;
}

.ai-label {
  font-family: var(--mono);
  font-size: 8px;
  color: var(--green);
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-bottom: 5px;
}

.ai-content {
  font-family: var(--mono);
  font-size: 11px;
  color: #2d5a3d;
  line-height: 1.7;
}

.ai-content.loading {
  color: var(--ink3);
  font-style: italic;
}

/* ── LOADING ──────────────────────────────── */
.loader {
  padding: 60px;
  text-align: center;
  background: var(--surface);
  border: 1px solid var(--border);
}

.loader-bars {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
  margin-bottom: 14px;
}

.lbar {
  width: 3px;
  background: var(--green);
  border-radius: 3px;
  animation: lwave 1.1s ease infinite;
}

.lbar:nth-child(1){height:8px;animation-delay:0s}
.lbar:nth-child(2){height:20px;animation-delay:.1s}
.lbar:nth-child(3){height:36px;animation-delay:.2s}
.lbar:nth-child(4){height:14px;animation-delay:.3s}
.lbar:nth-child(5){height:28px;animation-delay:.4s}
.lbar:nth-child(6){height:10px;animation-delay:.3s}
.lbar:nth-child(7){height:22px;animation-delay:.2s}

@keyframes lwave {
  0%,100%{transform:scaleY(.3);opacity:.4}
  50%{transform:scaleY(1);opacity:1}
}

.loader-text {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--ink3);
  letter-spacing: 3px;
  text-transform: uppercase;
}

/* ── FOOTER ───────────────────────────────── */
footer {
  border-top: 1px solid var(--border);
  padding: 20px 28px;
  max-width: 880px;
  margin: 0 auto;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 8px;
}

.footer-logo {
  font-family: var(--synemono);
  font-size: 13px;
  letter-spacing: 2px;
  color: var(--ink);
}

.footer-meta {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--ink3);
  letter-spacing: 1px;
}

/* ── RESPONSIVE ───────────────────────────── */
@media(max-width: 600px){
  .hero-inner { grid-template-columns: 1fr; }
  .hero-stats { flex-direction: row; align-items: flex-start; }
  .subscribe-bar { grid-template-columns: 1fr; }
  .sub-form { flex-direction: column; }
  .sub-input { width: 100%; }
  .quake-card { grid-template-columns: 60px 1fr; padding: 16px; }
  .topbar-sub { display: none; }
  .hstat-num { font-size: 22px; }
}

/* ── TOPBAR BYLINE ──────────────────────────── */
.topbar-byline {
  font-family: var(--mono);
  font-size: 10px;
  color: #555;
  letter-spacing: 1px;
}
.topbar-byline span {
  color: #4ade80;
  font-style: italic;
}

/* ── HERO AUTHOR ────────────────────────────── */
.hero-author {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 16px;
  padding-top: 16px;
  border-top: 1px solid rgba(255,255,255,0.08);
}
.hero-author-by {
  font-family: var(--mono);
  font-size: 9px;
  color: #555;
  letter-spacing: 2px;
  text-transform: uppercase;
}
.hero-author-name {
  font-family: var(--syne);
  font-weight: 700;
  font-size: 15px;
  color: #fff;
  letter-spacing: 0.5px;
}
.hero-author-handle {
  font-family: var(--synemono);
  font-size: 11px;
  color: #4ade80;
  letter-spacing: 1px;
}

/* ── ABOUT CARD ─────────────────────────────── */
.about-card {
  background: var(--ink);
  margin-top: 32px;
  padding: 36px 40px;
  display: grid;
  grid-template-columns: 200px 1fr;
  gap: 40px;
  align-items: start;
  position: relative;
  overflow: hidden;
}

.about-card::before {
  content: 'Z';
  position: absolute;
  right: -10px;
  bottom: -30px;
  font-family: var(--syne);
  font-size: 180px;
  font-weight: 800;
  color: rgba(74,222,128,0.04);
  pointer-events: none;
  line-height: 1;
}

.about-tag {
  font-family: var(--mono);
  font-size: 9px;
  color: #4ade80;
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-bottom: 16px;
}

.about-name {
  font-family: var(--syne);
  font-size: 32px;
  font-weight: 800;
  color: #fff;
  line-height: 1.1;
  letter-spacing: -0.5px;
  margin-bottom: 8px;
}

.about-name em {
  font-style: normal;
  color: #4ade80;
}

.about-handle {
  font-family: var(--synemono);
  font-size: 13px;
  color: #666;
  letter-spacing: 2px;
  padding: 4px 10px;
  border: 1px solid #333;
  display: inline-block;
}

.about-desc {
  font-family: var(--mono);
  font-size: 12px;
  color: #888;
  line-height: 1.9;
  margin-bottom: 20px;
  padding-top: 4px;
}

.about-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.about-pill {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 2px;
  color: #4ade80;
  border: 1px solid rgba(74,222,128,0.25);
  padding: 4px 10px;
  background: rgba(74,222,128,0.05);
}

/* ── FOOTER SIG ─────────────────────────────── */
.footer-sig {
  display: flex;
  flex-direction: column;
  gap: 2px;
  align-items: center;
}

.footer-sig-label {
  font-family: var(--mono);
  font-size: 8px;
  color: #aaa;
  letter-spacing: 2px;
  text-transform: uppercase;
}

.footer-sig-name {
  font-family: var(--syne);
  font-weight: 700;
  font-size: 13px;
  color: var(--ink);
  letter-spacing: 0.5px;
}

@media(max-width:600px){
  .about-card { grid-template-columns: 1fr; padding: 28px 20px; gap: 24px; }
  .about-name { font-size: 24px; }
}


/* ── INFO GRID ──────────────────────────────── */
.info-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 2px;
  margin: 32px 0 2px;
}

.info-card {
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 28px 28px 24px;
}

.info-card-tag {
  font-family: var(--mono);
  font-size: 8px;
  color: var(--green);
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-bottom: 12px;
}

.info-card-title {
  font-family: var(--syne);
  font-weight: 700;
  font-size: 17px;
  color: var(--ink);
  margin-bottom: 12px;
  line-height: 1.2;
}

.info-card-body {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--ink2);
  line-height: 1.9;
}

.richter-table { width: 100%; margin-top: 14px; border-collapse: collapse; }
.richter-table tr { border-bottom: 1px solid var(--border); }
.richter-table td { padding: 6px 4px; font-family: var(--mono); font-size: 10px; }
.richter-table td:first-child { font-weight: 500; width: 48px; }
.richter-table td:last-child { color: var(--ink3); }
.rt-severe  { color: var(--red) !important; }
.rt-mod     { color: var(--amber) !important; }
.rt-minor   { color: #aaa !important; }

.steps-list { list-style: none; margin-top: 10px; counter-reset: step; }
.steps-list li {
  counter-increment: step;
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 7px 0;
  border-bottom: 1px solid var(--border);
  font-family: var(--mono);
  font-size: 11px;
  color: var(--ink2);
  line-height: 1.6;
}
.steps-list li::before {
  content: counter(step, decimal-leading-zero);
  font-family: var(--synemono);
  font-size: 10px;
  color: var(--green);
  flex-shrink: 0;
  margin-top: 2px;
}

.how-steps { margin-top: 12px; display: flex; flex-direction: column; gap: 10px; }
.how-step {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  padding: 10px 14px;
  background: var(--bg);
  border-left: 2px solid var(--border);
}
.how-step-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
.how-step-text { font-family: var(--mono); font-size: 11px; color: var(--ink2); line-height: 1.7; }
.how-step-text strong { color: var(--ink); font-weight: 500; display: block; margin-bottom: 2px; }

.fault-list { margin-top: 10px; display: flex; flex-direction: column; gap: 6px; }
.fault-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 12px;
  background: var(--bg);
  border-left: 2px solid var(--border);
}
.fault-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.fault-dot.high   { background: var(--red); box-shadow: 0 0 4px var(--red); }
.fault-dot.medium { background: var(--amber); }
.fault-dot.low    { background: #ccc; }
.fault-name { font-family: var(--syne); font-size: 12px; font-weight: 600; color: var(--ink); }
.fault-detail { font-family: var(--mono); font-size: 9px; color: var(--ink3); letter-spacing: 0.5px; }

/* ── CONTACT / SOCIAL ───────────────────────── */
.contact-section {
  background: var(--ink);
  margin-top: 2px;
  padding: 48px 40px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 48px;
  align-items: center;
}

.contact-left {}

.contact-eyebrow {
  font-family: var(--mono);
  font-size: 9px;
  color: #4ade80;
  letter-spacing: 4px;
  text-transform: uppercase;
  margin-bottom: 14px;
}

.contact-heading {
  font-family: var(--syne);
  font-weight: 800;
  font-size: 36px;
  color: #fff;
  line-height: 1.0;
  letter-spacing: -1px;
  margin-bottom: 14px;
}

.contact-heading em {
  font-style: normal;
  color: #4ade80;
}

.contact-sub {
  font-family: var(--mono);
  font-size: 11px;
  color: #666;
  line-height: 1.8;
}

.contact-right {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.social-link {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 16px 20px;
  border: 1px solid #222;
  background: #111;
  text-decoration: none;
  transition: all 0.2s;
  cursor: pointer;
}

.social-link:hover { border-color: #4ade80; background: rgba(74,222,128,0.05); }

.social-icon {
  font-size: 18px;
  width: 28px;
  text-align: center;
  flex-shrink: 0;
}
